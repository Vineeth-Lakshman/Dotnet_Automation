name: Copilot Agent Workflow with Slack Gate

on:
  repository_dispatch:
    types: [jira_ticket_assigned]
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Jira Ticket ID'
        required: true
        default: 'KAN-9'
      ticket_description:
        description: 'Task Description'
        required: true
        default: 'Add DueDate attribute to TodoItem model'

jobs:
  slack-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Alert
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            🤖 *Jira Ticket Dispatched:* `${{ inputs.ticket_id }}`
            *Task:* ${{ inputs.ticket_description }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  execute-copilot-task:
    needs: slack-notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify Build
        working-directory: ./TodoApp
        run: dotnet build

      # Create Pull Request step using verified marketplace action
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(${{ inputs.ticket_id }}): ${{ inputs.ticket_description }}"
          title: "${{ inputs.ticket_id }}: ${{ inputs.ticket_description }}"
          body: |
            Automated PR for Jira Ticket `${{ inputs.ticket_id }}`.
            
            **Description:** ${{ inputs.ticket_description }}
          branch: "feature/${{ inputs.ticket_id }}"
          delete-branch: true
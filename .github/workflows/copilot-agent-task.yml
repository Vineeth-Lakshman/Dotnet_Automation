name: Copilot Agent Workflow with Slack Gate

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Jira Ticket ID'
        required: true
      ticket_description:
        description: 'Task Prompt from Jira'
        required: true

jobs:
  slack-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Alert
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            🤖 *Jira Ticket Dispatched to Agent:* `${{ inputs.ticket_id }}`
            *Prompt:* ${{ inputs.ticket_description }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  execute-copilot-task:
    needs: slack-notification
    environment: agent-approval   # <--- Human in the Loop approval gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Uses GitHub's official Agent CLI / Action to dynamically generate code
      - name: Invoke AI Agent Engine
        uses: github/copilot-action@v1  # Triggers dynamic agent generation
        with:
          prompt: ${{ inputs.ticket_description }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Build
        run: dotnet build *.csproj
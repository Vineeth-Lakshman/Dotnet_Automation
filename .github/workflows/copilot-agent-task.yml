name: Copilot Agent Workflow with Slack Gate

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Jira Ticket ID'
        required: true
        default: 'DEMO-101'
      ticket_description:
        description: 'Description of task'
        required: true
        default: 'Add DueDate attribute to TodoItem model'

jobs:
  slack-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Alert
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: 'C0BJTV1UYJD'
          slack-message: |
            🤖 *Jira Ticket Assigned:* `${{ inputs.ticket_id }}`
            *Task:* ${{ inputs.ticket_description }}
            *Status:* Task approved and dispatched to Copilot Agent.
        env:
          SLACK_BOT_TOKEN: 'xoxb-11620195044407-11637200517618-WIBMaaUp0Gr7GaNNOnUafaRo'

  execute-copilot-task:
    needs: slack-notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify Build
        run: dotnet build TodoApp/TodoApp.csproj
